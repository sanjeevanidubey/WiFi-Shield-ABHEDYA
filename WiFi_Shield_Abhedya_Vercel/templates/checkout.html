<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | WiFi Shield Abhedya</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <nav>
        <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
            <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo" class="logo-img" style="width: 40px;">
            <span class="logo-text">Abhedya</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button></li>
        </ul>
    </nav>

    <div class="container animate-in">
        <div class="glass-panel" style="max-width: 500px; margin: 5rem auto;">
            <div class="card" style="padding: 3rem;">
                <h2 style="color: var(--accent-blue); margin-bottom: 2rem; text-align: center;">Secure Bank Payment</h2>
                <p style="color: var(--text-secondary); text-align: center; margin-bottom: 2rem;">Please provide your account details to activate the premium license.</p>
                
                <form onsubmit="event.preventDefault(); const name = document.getElementById('account-name').value; alert('Simulation: Payment Processed Successfully!'); window.location.href='/?user=' + encodeURIComponent(name);">
                    <div class="form-group">
                        <label>Account Holder Name</label>
                        <input type="text" id="account-name" placeholder="e.g. John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Bank Name</label>
                        <input type="text" placeholder="e.g. Central Bank" required>
                    </div>
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="password" placeholder="•••• •••• •••• ••••" required>
                    </div>
                    <div class="form-group">
                        <label>Routing / Swift Code</label>
                        <input type="text" placeholder="e.g. 123456789" required>
                    </div>
                    
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Process Payment Securely</button>
                </form>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Stripe_Logo%2C_revised_2016.svg" alt="Stripe" style="width: 100px; filter: grayscale(1) invert(1) opacity(0.5);">
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
