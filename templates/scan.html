<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Scan | WiFi Shield Abhedya</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <nav>
        <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
            <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo" class="logo-img" style="width: 40px;">
            <span class="logo-text">Abhedya</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/scan" class="active">Scan</a></li>
            <li><a href="/subscribe">Subscription</a></li>
            <li><a href="/about">About</a></li>
            <li><button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button></li>
        </ul>
    </nav>

    <div class="container animate-in">
        <div class="scanner-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh;">
            <div class="radar" style="width: 250px; height: 250px; border-radius: 50%; border: 2px solid var(--accent-blue); position: relative; overflow: hidden;">
                <!-- Animated Scanner Beam -->
                <div style="position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, var(--accent-blue)); opacity: 0.3; animation: rotate 2s linear infinite;"></div>
            </div>
            
            <h2 id="status-text" class="scanning-text" style="margin-top: 3rem; color: var(--accent-blue); letter-spacing: 4px; font-family: 'Orbitron', sans-serif;">INITIALIZING SCAN...</h2>
            <p id="sub-status" style="color: var(--text-secondary); margin-top: 1rem;">Booting Abhedya Intelligence Module...</p>
            
            <div style="margin-top: 2rem; width: 300px; height: 4px; background: var(--glass-bg); border-radius: 2px; overflow: hidden;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: var(--accent-blue); transition: width 0.5s ease;"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        const statusMessages = [
            "SCANNING PACKETS...",
            "ANALYZING BSSIDs...",
            "VERIFYING ENCRYPTION...",
            "FINGERPRINTING NODES...",
            "IDENTIFYING ROUGE APs...",
            "FINALIZING REPORT..."
        ];
        
        let msgIndex = 0;
        const statusEl = document.getElementById('status-text');
        const progressEl = document.getElementById('progress-bar');
        
        const interval = setInterval(() => {
            if (msgIndex < statusMessages.length) {
                statusEl.innerText = statusMessages[msgIndex];
                progressEl.style.width = ((msgIndex + 1) / statusMessages.length) * 100 + "%";
                msgIndex++;
            } else {
                clearInterval(interval);
                window.location.href = "/result";
            }
        }, 1000);

        // Cyber sound effect
        window.addEventListener('load', () => {
            const audio = new Audio('https://www.soundjay.com/buttons/sounds/beep-07a.mp3');
            audio.volume = 0.2;
            audio.play().catch(e => console.log("Sound blocked"));
        });
    </script>
    
    <style>
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
